<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISC² CC Cyber Arcade</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        a { color: #58a6ff; text-decoration: none; }
        button, .btn { background: linear-gradient(135deg, #1f6feb 0%, #10529b 100%); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .badge { display: inline-block; padding: 4px 8px; font-size: 0.85em; font-weight: bold; border-radius: 4px; }
        .badge-success { background: #238636; color: white; }
        .badge-danger { background: #da3633; color: white; }
        .progress-bar-container { background: #30363d; border-radius: 4px; height: 10px; width: 100%; margin: 5px 0 15px 0; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: #58a6ff; transition: width 0.4s ease; }
    </style>
</head>
<body>
    <header style="border-bottom: 1px solid #30363d; padding-bottom: 15px; margin-bottom: 25px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin: 0; color: #58a6ff;">⚡ CC CYBER ARCADE</h2>
            <nav>
                {% if session.get('username') %}
                    <a href="{{ url_for('dashboard') }}" style="margin-right: 15px;">Dashboard</a>
                    <a href="{{ url_for('admin') }}" style="margin-right: 15px; color: #79c0ff;">💾 Instant Import</a>
                    <a href="{{ url_for('logout') }}" style="color: #f85149;">Exit</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
